name: iOS Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    - name: Install XcodeGen
      run: brew install xcodegen
    - name: Generate Xcode project
      run: xcodegen generate
    - name: Build iOS app
      run: |
        xcodebuild clean build \
          -project EmbyPulse.xcodeproj \
          -scheme EmbyPulse \
          -configuration Release \
          -destination generic/platform=iOS \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          -verbose
    - name: Create IPA
      run: |
        mkdir -p Payload
        cp -r build/Build/Products/Release-iphoneos/EmbyPulse.app Payload/
        zip -r EmbyPulse_iOS.ipa Payload/
        rm -rf Payload
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: emby-pulse-ipa
        path: EmbyPulse_iOS.ipa
